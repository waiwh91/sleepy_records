<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sleepy Records." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Sleepy Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <a class="logo" href="#top">sleepy records</a>
      <nav>
        <a href="https://sleepingsheep.bandcamp.com/" target="_blank" rel="noreferrer">listen ↗</a>
        <a href="https://sleepingsheep.bandcamp.com/contact" target="_blank" rel="noreferrer">contact ↗</a>
      </nav>
    </header>

    <main id="top">
      <section class="frame frame-street" data-shift="-14">
        <img
          src="assets/photos/street.jpg"
          alt="A black and white street scene"
          fetchpriority="high"
        />
        <h1>sleepy<br />records</h1>
        <button class="hint" type="button">touch the pictures</button>
      </section>

      <section class="frame frame-field" data-shift="10">
        <img src="assets/photos/field.jpg" alt="Cyclists crossing a green field" loading="lazy" />
        <a
          class="release release-one"
          href="https://sleepingsheep.bandcamp.com/album/sleepingsheep"
          target="_blank"
          rel="noreferrer"
          aria-label="Sleepingsheep on Bandcamp"
        >
          <img src="https://f4.bcbits.com/img/a3454929594_16.jpg" alt="Sleepingsheep cover" />
          <span>001 ↗</span>
        </a>
        <p>beautiful noise makers</p>
      </section>

      <section class="frame frame-live" data-shift="18">
        <img src="assets/photos/live.jpg" alt="Sleepingsheep live" loading="lazy" />
        <a
          class="release release-two"
          href="https://sleepingsheep.bandcamp.com/track/flowers-demo"
          target="_blank"
          rel="noreferrer"
          aria-label="Flowers Demo on Bandcamp"
        >
          <img src="https://f4.bcbits.com/img/a1087075343_16.jpg" alt="Flowers Demo cover" />
          <span>demo ↗</span>
        </a>
        <span class="mark" aria-hidden="true">×</span>
      </section>
    </main>

    <footer>
      <a href="#top">sleep again ↑</a>
      <span>上海</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
